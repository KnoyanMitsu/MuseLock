name: Build & Release Prism

on:
  push:
    tags:
      - "v*" # Trigger release kalau ada tag v...
  workflow_dispatch: # Trigger manual

jobs:
  # 1. BUILD ANDROID
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      # --- UPDATE: Ganti ke Stable Channel ---
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Selalu ambil Flutter terbaru
          cache: true       # Biar build berikutnya lebih cepat
      # ---------------------------------------

      - run: flutter pub get
      - run: flutter build apk --release
      - run: mv build/app/outputs/flutter-apk/app-release.apk app-release.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: app-release.apk

  
